<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>dispo+ — Login</title>

<link rel="icon" type="image/x-icon" href="icon/dispoicon-dplus.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/theme.css">

<script>
(function(){
    const theme = localStorage.getItem("dispo-theme") === "dark" ? "dark" : "light";
    document.documentElement.setAttribute("data-theme", theme);
})();
</script>

<!-- If already logged in, skip straight past this page -->
<style>
html:not(.checked-session) body{visibility:hidden}
html:not(.checked-session)::before{
  content:"";
  position:fixed;
  inset:0;
  background:var(--bg);
  z-index:9998;
}
html:not(.checked-session)::after{
  content:"";
  position:fixed;
  top:50%;
  left:50%;
  width:38px;
  height:38px;
  margin:-19px 0 0 -19px;
  border:3px solid var(--border);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:dispoAuthSpin .7s linear infinite;
  z-index:9999;
}
@keyframes dispoAuthSpin{ to { transform:rotate(360deg); } }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
</head>

<body>

<!-- ============ TOPBAR ============ -->
<header class="topbar">
  <a href="index.html" class="topbar-brand" style="text-decoration:none;">
    dispo<span>+</span>
    <span class="topbar-page-label">Login</span>
  </a>

  <div class="topbar-right">
    <button class="theme-toggle-btn" id="themeToggleBtn" aria-label="Toggle theme">
      <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/></svg>
    </button>
  </div>
</header>

<div class="login-wrap">
  <div class="login-card">

    <!-- ============ SIGN IN VIEW ============ -->
    <div id="signInView" class="login-view active">
      <div class="login-logo">dispo<span>+</span></div>
      <p class="login-subtitle">Sign in to continue</p>

      <form id="signInForm">
        <div class="login-field">
          <label for="signInEmail">Email</label>
          <input type="email" id="signInEmail" class="textInput" placeholder="you@company.com" autocomplete="username" required>
        </div>

        <div class="login-field">
          <label for="signInPassword">Password</label>
          <input type="password" id="signInPassword" class="textInput" placeholder="••••••••" autocomplete="current-password" required>
        </div>

        <button type="submit" id="signInBtn" class="login-submit">Log In</button>

        <div id="signInError" class="login-error"></div>
      </form>

      <div class="login-switch-row">
        New here? <button type="button" id="openSignUpBtn" class="login-switch-link">Create an account</button>
      </div>
    </div>

    <!-- ============ SIGN UP VIEW ============ -->
    <div id="signUpView" class="login-view">
      <button type="button" id="backToSignInBtn" class="login-back-link">
        <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        Back to Sign In
      </button>

      <div class="login-logo">dispo<span>+</span></div>
      <p class="login-subtitle">Create your agent account</p>

      <form id="signUpForm">
        <div class="login-field-row">
          <div class="login-field">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" class="textInput" placeholder="Aaron" autocomplete="given-name" required>
          </div>

          <div class="login-field">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" class="textInput" placeholder="Dela Cruz" autocomplete="family-name" required>
          </div>
        </div>

        <div class="login-field">
          <label for="gender">Gender</label>
          <select id="gender" class="textInput" required>
            <option value="" disabled selected>Select...</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
            <option value="Prefer not to say">Prefer not to say</option>
          </select>
        </div>

        <div class="login-field">
          <label for="signUpEmail">Email</label>
          <input type="email" id="signUpEmail" class="textInput" placeholder="you@company.com" autocomplete="username" required>
        </div>

        <div class="login-field">
          <label for="signUpPassword">Password</label>
          <input type="password" id="signUpPassword" class="textInput" placeholder="At least 6 characters" autocomplete="new-password" minlength="6" required>
        </div>

        <button type="submit" id="signUpBtn" class="login-submit">Create Account</button>

        <div id="signUpError" class="login-error"></div>
        <div id="signUpSuccess" class="login-success"></div>
      </form>
    </div>

    <p class="login-footer-note">dispo+ · internal screening toolkit</p>
  </div>
</div>

<script src="js/theme.js"></script>
<script>
(function () {
  if (!window.SUPABASE_URL || window.SUPABASE_URL === "YOUR_SUPABASE_PROJECT_URL") {
    document.documentElement.classList.add("checked-session");
    var err = document.getElementById("signInError");
    err.textContent = "Login isn't configured yet — supabase-config.js needs your project URL and anon key.";
    err.classList.add("show");
    return;
  }

  var client = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

  function getRedirectTarget() {
    var params = new URLSearchParams(location.search);
    var redirect = params.get("redirect");
    if (redirect) {
      // redirect is a bare filename like "productivity.html?x=1", pages live in /pages/
      return "pages/" + redirect;
    }
    return "index.html";
  }

  // Safety net: never leave this page invisible for more than 2.5s.
  var revealTimeout = setTimeout(function () {
    document.documentElement.classList.add("checked-session");
  }, 2500);

  // If a session already exists, skip the login form entirely.
  client.auth.getSession().then(function (res) {
    clearTimeout(revealTimeout);
    if (res.data && res.data.session) {
      location.replace(getRedirectTarget());
      return;
    }
    document.documentElement.classList.add("checked-session");
  }).catch(function () {
    clearTimeout(revealTimeout);
    document.documentElement.classList.add("checked-session");
  });

  // ============ VIEW SWITCHING (Sign In <-> Sign Up) ============
  var signInView = document.getElementById("signInView");
  var signUpView = document.getElementById("signUpView");

  function showSignUp() {
    signInView.classList.remove("active");
    signUpView.classList.add("active");
  }

  function showSignIn() {
    signUpView.classList.remove("active");
    signInView.classList.add("active");
  }

  document.getElementById("openSignUpBtn").addEventListener("click", showSignUp);
  document.getElementById("backToSignInBtn").addEventListener("click", showSignIn);

  // ============ SIGN IN ============
  var signInForm = document.getElementById("signInForm");
  var signInBtn = document.getElementById("signInBtn");
  var signInError = document.getElementById("signInError");

  signInForm.addEventListener("submit", function (e) {
    e.preventDefault();
    signInError.classList.remove("show");
    signInBtn.disabled = true;
    signInBtn.textContent = "Logging in…";

    var email = document.getElementById("signInEmail").value.trim();
    var password = document.getElementById("signInPassword").value;

    client.auth.signInWithPassword({ email: email, password: password })
      .then(function (res) {
        if (res.error) {
          signInError.textContent = res.error.message || "Login failed. Check your email and password.";
          signInError.classList.add("show");
          signInBtn.disabled = false;
          signInBtn.textContent = "Log In";
          return;
        }
        location.href = getRedirectTarget();
      })
      .catch(function () {
        signInError.textContent = "Something went wrong. Please try again.";
        signInError.classList.add("show");
        signInBtn.disabled = false;
        signInBtn.textContent = "Log In";
      });
  });

  // ============ SIGN UP ============
  var signUpForm = document.getElementById("signUpForm");
  var signUpBtn = document.getElementById("signUpBtn");
  var signUpError = document.getElementById("signUpError");
  var signUpSuccess = document.getElementById("signUpSuccess");

  signUpForm.addEventListener("submit", function (e) {
    e.preventDefault();
    signUpError.classList.remove("show");
    signUpSuccess.classList.remove("show");
    signUpBtn.disabled = true;
    signUpBtn.textContent = "Creating account…";

    var firstName = document.getElementById("firstName").value.trim();
    var lastName = document.getElementById("lastName").value.trim();
    var gender = document.getElementById("gender").value;
    var email = document.getElementById("signUpEmail").value.trim();
    var password = document.getElementById("signUpPassword").value;

    client.auth.signUp({
      email: email,
      password: password,
      options: {
        data: {
          first_name: firstName,
          last_name: lastName,
          full_name: firstName + " " + lastName,
          gender: gender
        }
      }
    }).then(function (res) {
      signUpBtn.disabled = false;
      signUpBtn.textContent = "Create Account";

      if (res.error) {
        signUpError.textContent = res.error.message || "Could not create account.";
        signUpError.classList.add("show");
        return;
      }

      // If email confirmation is required in your Supabase project,
      // there's no session yet — show a message instead of redirecting.
      if (res.data && res.data.session) {
        location.href = getRedirectTarget();
      } else {
        signUpForm.reset();
        signUpSuccess.textContent = "Account created! Check your email to confirm before logging in.";
        signUpSuccess.classList.add("show");
      }
    }).catch(function () {
      signUpBtn.disabled = false;
      signUpBtn.textContent = "Create Account";
      signUpError.textContent = "Something went wrong. Please try again.";
      signUpError.classList.add("show");
    });
  });
})();
</script>

</body>
</html>
